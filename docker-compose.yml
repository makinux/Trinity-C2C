name: trinity-c2c

# ---------------------------------------------------------------
# app: CPU app image. Runs self-tests / training / evaluation / on-device C2C validation.
#   Default command = full self-test suite (no model, no GPU needed).
#   On-device C2C : docker compose run --rm app python trinity_c2c_realrun.py
#   Training      : docker compose run --rm app python trinity_train.py
#   Eval (GPU)    : docker compose --profile gpu up -d --wait   # <- wait until healthy
#                 docker compose run --rm app python trinity_eval.py --trials 3
# ---------------------------------------------------------------
services:
  app:
    build:
      context: .
      args:
        WITH_DATASETS: ${WITH_DATASETS:-0}
    image: trinity-c2c:latest
    environment:
      PYTHONUTF8: "1"
      HF_TOKEN: ${HF_TOKEN:-}
      THINKER_URL: ${THINKER_URL:-http://thinker:8000/v1}
      WORKER_URL: ${WORKER_URL:-http://worker:8000/v1}
      VERIFIER_URL: ${VERIFIER_URL:-http://verifier:8000/v1}
    volumes:
      - hf-cache:/root/.cache/huggingface     # you may bind the host's ~/.cache/huggingface instead

  # ----- gateway: OpenAI-compatible API + debug ChatUI on http://localhost:8080 -----
  #   Lightweight image (Dockerfile.gateway, no torch/transformers) — builds in seconds.
  #   Standalone by default: TRINITY_GATEWAY_MOCK=1 uses the offline mock backend (no GPU).
  #     docker compose up -d --build --wait gateway     # then open http://localhost:8080/
  #   Real models via local Ollama (no GPU required):
  #     docker compose --env-file .env.ollama up -d --build --wait gateway ollama ollama-pull
  #   Real models via the gpu vLLM profile: set TRINITY_GATEWAY_MOCK=0 and start the gpu servers.
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    image: trinity-c2c-gateway:latest
    environment:
      PYTHONUTF8: "1"
      TRINITY_GATEWAY_HOST: "0.0.0.0"
      TRINITY_GATEWAY_PORT: "8080"
      TRINITY_GATEWAY_MOCK: ${TRINITY_GATEWAY_MOCK:-1}
      THINKER_URL: ${THINKER_URL:-http://thinker:8000/v1}
      WORKER_URL: ${WORKER_URL:-http://worker:8000/v1}
      VERIFIER_URL: ${VERIFIER_URL:-http://verifier:8000/v1}
      THINKER_MODEL_ID: ${THINKER_MODEL_ID:-}
      WORKER_MODEL_ID: ${WORKER_MODEL_ID:-}
      VERIFIER_MODEL_ID: ${VERIFIER_MODEL_ID:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request as u; u.urlopen('http://localhost:8080/healthz')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----- gateway-c2c: gateway WITH the in-process C2C (KV-fusion) backend (no GPU) -----
  #   Heavier image (Dockerfile.gateway.c2c = + torch + transformers, ~2GB). Runs REAL
  #   heterogeneous Cache-to-Cache (SmolLM2-135M -> Qwen2.5-0.5B) in-process. One command:
  #     docker compose --profile c2c up -d --build --wait gateway-c2c   # first run builds the image
  #     # open http://localhost:8080/ , UNCHECK "Mock mode", CHECK "C2C (KV fusion)", set gate, Run
  #     docker compose --profile c2c down                               # stop
  #   The FIRST C2C request downloads the two small models into the hf-cache volume (a few minutes,
  #   CPU). Subsequent runs reuse the cache. Bump models via SHARER_MODEL_ID / RECEIVER_MODEL_ID.
  #   NOTE: name the service (as above) — it shares host port 8080 with the default `gateway`, so
  #   run one OR the other. To run both, set GATEWAY_C2C_PORT to a free host port.
  gateway-c2c:
    build:
      context: .
      dockerfile: Dockerfile.gateway.c2c
    image: trinity-c2c-gateway-c2c:latest
    profiles: ["c2c"]
    environment:
      PYTHONUTF8: "1"
      TRINITY_GATEWAY_HOST: "0.0.0.0"
      TRINITY_GATEWAY_PORT: "8080"
      TRINITY_GATEWAY_MOCK: "0"
      TRINITY_C2C: "1"
      TRINITY_C2C_GATE: ${TRINITY_C2C_GATE:-}                 # default = config.yml c2c.init_gate (0.05)
      TRINITY_C2C_MAX_NEW_TOKENS: ${TRINITY_C2C_MAX_NEW_TOKENS:-256}
      TRINITY_C2C_FUSER: ${TRINITY_C2C_FUSER:-}               # trained fuser checkpoint, e.g. /app/checkpoints/distill.pt
      HF_HOME: /hf-cache
      HF_TOKEN: ${HF_TOKEN:-}
      SHARER_MODEL_ID: ${SHARER_MODEL_ID:-}                   # override the Thinker(sharer) model tag
      RECEIVER_MODEL_ID: ${RECEIVER_MODEL_ID:-}               # override the Worker(receiver) model tag
    ports:
      - "${GATEWAY_C2C_PORT:-8080}:8080"                      # set GATEWAY_C2C_PORT to avoid the 8080 clash
    volumes:
      - hf-cache:/hf-cache                                    # persist downloaded models across runs
      - ./checkpoints:/app/checkpoints:ro                     # trained fuser checkpoints (set TRINITY_C2C_FUSER above)
    healthcheck:   # /healthz is cheap (no model load); the engine loads lazily on the first C2C run
      test: ["CMD-SHELL", "python -c \"import urllib.request as u; u.urlopen('http://localhost:8080/healthz')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----- ollama: local OpenAI-compatible models (no GPU required; CPU works) -----
  #   Enable with the .env.ollama sample by naming the services (the `ollama` profile keeps them
  #   out of a bare `docker compose up`), e.g.:
  #     cp .env.ollama.example .env.ollama
  #     docker compose --env-file .env.ollama up -d --build --wait gateway ollama ollama-pull
  #   The gateway (above) is pointed at this service via .env.ollama (THINKER_URL=...:11434/v1, MOCK=0).
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    volumes:
      - ollama-data:/root/.ollama
    # Uncomment to also reach Ollama from the host (clashes with a host Ollama on 11434):
    # ports: ["11434:11434"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    # Uncomment to give Ollama an NVIDIA GPU (otherwise it runs on CPU):
    # deploy: { resources: { reservations: { devices: [{ driver: nvidia, count: 1, capabilities: [gpu] }] } } }

  # One-shot: pulls the per-role model tags into the ollama volume, then exits.
  ollama-pull:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        for m in "${THINKER_MODEL_ID:-qwen2.5:3b}" "${WORKER_MODEL_ID:-qwen2.5-coder:3b}" "${VERIFIER_MODEL_ID:-deepseek-r1:1.5b}"; do
          echo "==> ollama pull $$m"; ollama pull "$$m";
        done
        echo "ollama-pull: done"
    restart: "no"

  # ----- GPU: local LLM servers (OpenAI-compatible vLLM). Requires NVIDIA GPU + nvidia-container-toolkit -----
  # 1 service = 1 GPU reserved. If VRAM is short, adjust model / max-model-len / gpu-memory-utilization.
  thinker:
    image: vllm/vllm-openai:latest
    profiles: ["gpu"]
    shm_size: "8gb"
    environment: { HF_TOKEN: "${HF_TOKEN:-}" }
    volumes: [ "hf-cache:/root/.cache/huggingface" ]
    command: ["--model", "${THINKER_MODEL:-THUDM/glm-4-9b-chat}",
              "--served-model-name", "glm-4", "--port", "8000",
              "--max-model-len", "4096", "--gpu-memory-utilization", "0.9"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request as u; u.urlopen('http://localhost:8000/v1/models')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 180s
    deploy: { resources: { reservations: { devices: [{ driver: nvidia, count: 1, capabilities: [gpu] }] } } }

  worker:
    image: vllm/vllm-openai:latest
    profiles: ["gpu"]
    shm_size: "8gb"
    environment: { HF_TOKEN: "${HF_TOKEN:-}" }
    volumes: [ "hf-cache:/root/.cache/huggingface" ]
    command: ["--model", "${WORKER_MODEL:-Qwen/Qwen2.5-Coder-7B-Instruct}",
              "--served-model-name", "qwen3-coder", "--port", "8000",
              "--max-model-len", "4096", "--gpu-memory-utilization", "0.9"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request as u; u.urlopen('http://localhost:8000/v1/models')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 180s
    deploy: { resources: { reservations: { devices: [{ driver: nvidia, count: 1, capabilities: [gpu] }] } } }

  verifier:
    image: vllm/vllm-openai:latest
    profiles: ["gpu"]
    shm_size: "8gb"
    environment: { HF_TOKEN: "${HF_TOKEN:-}" }
    volumes: [ "hf-cache:/root/.cache/huggingface" ]
    command: ["--model", "${VERIFIER_MODEL:-deepseek-ai/DeepSeek-R1-Distill-Qwen-7B}",
              "--served-model-name", "deepseek-r1-distill", "--port", "8000",
              "--max-model-len", "4096", "--gpu-memory-utilization", "0.9"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request as u; u.urlopen('http://localhost:8000/v1/models')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 180s
    deploy: { resources: { reservations: { devices: [{ driver: nvidia, count: 1, capabilities: [gpu] }] } } }

volumes:
  hf-cache:
  ollama-data:
