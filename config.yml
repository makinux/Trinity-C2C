# ============================================================
# Trinity / C2C local configuration (config.yml)
#   The TRINITY_CONFIG env var can point to a different path. Defaults to ./config.yml.
#   If the file or pyyaml is missing, the DEFAULTS in trinity_config.py are used.
#   *_URL env vars (THINKER_URL/WORKER_URL/VERIFIER_URL) override base_url.
#   <ROLE>_MODEL_ID env vars (THINKER_MODEL_ID/...) override model_id (e.g. to match an Ollama tag).
#   Secrets are best passed via <ROLE>_API_KEY (e.g. WORKER_API_KEY) in the env (avoid plaintext YAML).
# ============================================================

# Per-role models (OpenAI-compatible local endpoints)
models:
  thinker:
    name: GLM
    base_url: http://localhost:8001/v1
    model_id: glm-4
    api_key: EMPTY
    temperature: 0.6
    max_tokens: 4096
    # system_prompt: (when omitted, prompts.thinker is used)
  worker:
    name: Qwen3-Coder
    base_url: http://localhost:8002/v1
    model_id: qwen3-coder
    api_key: EMPTY
    temperature: 0.6
    max_tokens: 4096
  verifier:
    name: DeepSeek-R1
    base_url: http://localhost:8003/v1
    model_id: deepseek-r1-distill
    api_key: EMPTY
    temperature: 0.6
    max_tokens: 4096

# Per-role system prompts (models.<role>.system_prompt takes precedence if present)
prompts:
  thinker: "You are the Thinker. Analyze the problem and return only high-level plans, decompositions, and critiques of existing solutions. Do not write code or the final solution."
  worker: "You are the Worker. Building on the plans and critiques so far, produce the concrete final solution (complete code/derivation/numbers)."
  verifier: "You are the Verifier. Check whether the latest Worker artifact correctly and completely satisfies the query. Always output 'VERDICT: ACCEPT' or 'VERDICT: REVISE' on the last line. If REVISE, also state the specific fixes."

# Orchestration
orchestration:
  max_turns: 5
  verbose: true

# Coordinator (learned)
coordinator:
  slm_model: Qwen/Qwen3-0.6B      # small SLM that produces the features
  featurizer: qwen3               # qwen3 | mock
  mask_no_artifact: true          # forbid Verify before an artifact exists

# sep-CMA-ES training
training:
  budget: 8000
  sigma0: 0.3
  m_reps: 8
  seed: 0

# Evaluation harness
eval:
  trials: 1
  timeout: 10.0
  max_inputs: null                # null = all inputs (EvalPlus-faithful). A number sets an upper bound.

# C2C (latent fusion)
c2c:
  sharer_model: HuggingFaceTB/SmolLM2-135M-Instruct
  receiver_model: Qwen/Qwen2.5-0.5B-Instruct
  init_gate: 0.05
  tau: 1.0
