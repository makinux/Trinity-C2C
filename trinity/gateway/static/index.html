<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trinity-C2C · Workflow Debugger</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">★</span>
      <div>
        <h1>Trinity-C2C Workflow Debugger</h1>
        <p class="sub">Coordinator → Thinker → Worker → Verifier · live trace</p>
      </div>
    </div>
    <div class="topbar-right">
      <div class="status">
        <span id="health-dot" class="dot" title="gateway status"></span>
        <span id="health-text">checking…</span>
      </div>
      <button id="sidebar-toggle" class="icon-btn" title="Hide debug sidebar" aria-label="Toggle debug sidebar">⟩</button>
    </div>
  </header>

  <div class="layout">
    <main class="main">
      <section class="controls">
        <textarea id="query" rows="3" placeholder="Enter a task / query for the Trinity pipeline…">Write a Python function that merges two sorted lists. Also state its time complexity.</textarea>
        <div class="controls-row">
          <div class="opts">
            <label class="switch"><input type="checkbox" id="mock" checked /> <span>Mock mode (offline)</span></label>
            <label class="switch" title="Run the in-process Cache-to-Cache KV-fusion backend (needs the C2C gateway image / local torch). Overrides mock."><input type="checkbox" id="c2c" /> <span>C2C (KV fusion)</span></label>
            <label class="switch"><input type="checkbox" id="prompts" checked /> <span>Show prompts</span></label>
            <label class="num" title="C2C fusion gate 0..1 (0 = Worker alone; the untrained fuser degrades quality as the gate rises)">gate <input type="number" id="c2c-gate" min="0" max="1" step="0.05" value="0" /></label>
            <label class="num">max_turns <input type="number" id="max-turns" min="1" max="20" value="5" /></label>
            <label class="num">mock delay <input type="number" id="mock-delay" min="0" max="5" step="0.1" value="0.4" /> s</label>
          </div>
          <div class="actions">
            <button id="run" class="btn primary"><span class="spinner" aria-hidden="true"></span><span id="run-label">Run ▷</span></button>
            <button id="stop" class="btn" disabled>Stop ◻</button>
          </div>
        </div>
      </section>

      <!-- Final artifact: directly under Run/Stop. Rendered markdown by default, raw via tab. -->
      <section class="pane final-pane">
        <div class="pane-head">
          <h2>Final artifact</h2>
          <span id="final-badge" class="badge"></span>
          <span id="run-meta" class="run-meta"></span>
          <span class="grow"></span>
          <div class="tabs" id="final-tabs">
            <button class="tab active" data-view="md" id="tab-md">Markdown</button>
            <button class="tab" data-view="raw" id="tab-raw">Raw</button>
          </div>
        </div>
        <div id="error-banner" class="error-banner hidden"></div>
        <div id="final-md" class="md-body final-art">—</div>
        <pre id="final-raw" class="final-art raw-view hidden">—</pre>
      </section>
    </main>

    <div class="sidebar-resizer" id="sidebar-resizer" title="Drag to resize"></div>

    <!-- Debug sidebar (right edge): collapsible accordions, closed by default. -->
    <aside class="sidebar" id="sidebar">
      <details class="acc" id="acc-timeline">
        <summary>
          <span class="acc-chevron">▸</span>
          <span class="acc-title">Workflow timeline</span>
          <span id="timeline-count" class="acc-count"></span>
        </summary>
        <div id="timeline" class="timeline">
          <div class="empty">Run a query to see the Thinker / Worker / Verifier trace.</div>
        </div>
      </details>

      <details class="acc" id="acc-raw">
        <summary>
          <span class="acc-chevron">▸</span>
          <span class="acc-title">Raw events</span>
          <span class="acc-count">(<span id="raw-count">0</span>)</span>
        </summary>
        <pre id="raw-log" class="raw-log"></pre>
      </details>
    </aside>
  </div>

  <script src="app.js"></script>
</body>
</html>
